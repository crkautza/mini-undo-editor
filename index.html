<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Undo Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <textarea id="textarea"></textarea>
    <button id="add">Adicionar Palavra</button>
    <button id="undo">Desfazer</button>

    <input id="input" type="text" placeholder="Personalize a palavra adicionada">
    <button id="insert">Inserir</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
